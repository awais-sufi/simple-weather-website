<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple weather app to check weather conditions for any city" />
    <title>Weather App</title>
    <link rel="stylesheet" href="Weather.css" />
  </head>

  <body>
    <div class="card">
      <div class="search">
        <label for="city-input" class="visually-hidden">Enter city name</label>
        <input 
          type="text" 
          id="city-input"
          placeholder="Enter City Name" 
          spellcheck="false" 
          aria-label="City name"
        />
        <button type="button" aria-label="Search weather">
          <img src="images/search.png" alt="Search" />
        </button>
      </div>
      
      <div class="loading" aria-label="Loading weather data"></div>
      
      <div class="error" role="alert">
        <p></p>
      </div>
      
      <div class="weather">
        <img src="images/rain.png" class="weather-icon" alt="Weather condition" />
        <h1 class="temp">22°C</h1>
        <h2 class="city">New York</h2>
        <div class="details">
          <div class="col">
            <img src="images/humidity.png" alt="Humidity" />
            <div>
              <p class="humidity">22%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="images/wind.png" alt="Wind" />
            <div>
              <p class="wind">22 km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="Weather.js"></script>
  </body>
</html>
